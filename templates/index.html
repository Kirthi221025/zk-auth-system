<!DOCTYPE html>
<html>
<head>
    <title>ZKP Login Demo</title>
</head>
<body>
<h2>Zero Knowledge Proof Login</h2>

<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<script>
async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function register() {
    const username = username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    await fetch('/api/register/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, password})
    });

    alert("Registered");
}

async function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    const challengeRes = await fetch('/api/login/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username})
    });

    const challengeData = await challengeRes.json();
    const challenge = challengeData.challenge;

    const passwordHash = await sha256(password);
    const proof = await sha256(passwordHash + challenge);

    const verifyRes = await fetch('/api/verify/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, proof})
    });

    const result = await verifyRes.json();
    alert(JSON.stringify(result));
}
</script>

</body>
</html>
